<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python Basics Quiz</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <main class="container">
    <header class="quiz-header">
      <div class="logo">
        <span class="logo-symbol">&gt;&gt;&gt;</span>
        <span class="logo-text">pyquiz</span>
      </div>
      <div class="meta">
        <span class="badge">Intermediate</span>
        <span class="meta-sep">·</span>
        <span class="meta-label">Variables, Loops, Functions</span>
      </div>
    </header>

    <section class="progress-row" aria-label="Quiz progress">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="score-display" id="score-display">0 / 0</div>
    </section>

    <section id="question-panel" class="panel" aria-live="polite"></section>
    <section id="result-panel" class="panel result-panel" style="display:none;" aria-live="polite"></section>
  </main>

  <script src="js/questions.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
